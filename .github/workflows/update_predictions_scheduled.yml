name: Update Predictions Scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 4"  # Thu 21:00 JST

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Python import path
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> "$GITHUB_ENV"
          python -c "import os; print('PYTHONPATH=' + os.environ.get('PYTHONPATH', ''))"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: python -m compileall app src scripts

      - name: Run tests
        run: python -m pytest

      - name: Run next section prediction pipeline
        run: |
          echo "::group::Run scheduled prediction pipeline"
          echo "mode=scheduled-predictions"
          echo "season=2026_special"
          echo "category=100yj1"
          python scripts/full_pipeline.py --season 2026_special --category 100yj1 --mode next_section
          echo "::endgroup::"

      - name: Update all unplayed predictions
        run: |
          echo "::group::Update all unplayed predictions"
          python scripts/run_prediction.py --mode all_unplayed
          echo "::endgroup::"

      - name: Build past prediction results
        run: |
          echo "::group::Build past prediction results"
          python scripts/build_past_prediction_results.py
          echo "::endgroup::"

      - name: Validate generated outputs
        run: |
          echo "::group::Validate prediction outputs"
          python scripts/validate_prediction_outputs.py
          python scripts/validate_past_prediction_results.py
          if [ -e outputs/local/model_metrics.json ]; then
            echo "outputs/local/model_metrics.json must not be generated in Actions"
            exit 1
          fi
          echo "::endgroup::"

      - name: Commit scheduled prediction outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp_dir="$(mktemp -d)"
          for target in \
            Data/processed \
            Data/features \
            outputs/latest_predictions.json \
            outputs/latest_predictions.csv \
            outputs/all_unplayed_predictions.json \
            outputs/all_unplayed_predictions.csv \
            outputs/prediction_history \
            outputs/past_prediction_results.json \
            outputs/last_updated.txt
          do
            if [ -e "$target" ]; then
              mkdir -p "$tmp_dir/$(dirname "$target")"
              cp -a "$target" "$tmp_dir/$target"
              echo "Preserved $target"
            else
              echo "Skipped missing $target"
            fi
          done

          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          (cd "$tmp_dir" && tar -cf - .) | tar -xf -

          for target in \
            Data/processed \
            Data/features \
            outputs/latest_predictions.json \
            outputs/latest_predictions.csv \
            outputs/all_unplayed_predictions.json \
            outputs/all_unplayed_predictions.csv \
            outputs/prediction_history \
            outputs/past_prediction_results.json \
            outputs/last_updated.txt
          do
            if [ -e "$target" ]; then
              git add "$target"
              echo "Added $target"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update scheduled prediction outputs"
            git push
          fi
